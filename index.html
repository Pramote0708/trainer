<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>พิมพ์สัมผัส</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Noto Sans Thai', sans-serif;
  background: #f5f7fa;
}

#lesson {
  font-size: 50px;
  line-height: 1.8;
  padding: 20px;
  border-radius: 10px;
  background: #ffffff;
  border: 2px solid #ddd;
  min-height: 300px;
}

.correct { color: blue; }
.wrong { color: red; }
.pending { color: #aaa; }

.next {
  border-bottom: 4px solid #0d6efd;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

#input {
  font-size: 50px;
  height: 500px;
}

.stat-box {
  font-size: 28px;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header class="text-center mt-4">
  <h1 class="display-4 text-primary fw-bold">พิมพ์สัมผัส</h1>
  <p class="fs-3 text-success">ฝึกพิมพ์ให้เร็วและแม่นยำ</p>
</header>

<div class="text-center my-3">
  <button class="btn btn-outline-primary fs-1 me-2" onclick="setLesson('th')">ภาษาไทย</button>
  <button class="btn btn-outline-primary fs-1" onclick="setLesson('en')">ENGLISH</button>
  <button class="btn btn-outline-primary fs-1" onclick="setLesson('mix')">MIX</button>
</div>

<div class="container-fluid">

  <div id="lesson" class="mb-3 mx-3"></div>

  <div class="mx-3">
    <textarea id="input" class="form-control mb-3 text-primary" placeholder="เริ่มพิมพ์ที่นี่"></textarea>
  </div>

  <div class="stat-box text-center text-success mx-3 fs-1"> 
    Time: <span class="fs-1" id="time">00:00</span> |
    WPM: <span class="fs-1" id="wpm">0</span> |
    Accuracy: <span class="fs-1" id="acc">100%</span>

    <div class="mt-3">
      <button class="btn btn-danger px-4 fs-1" onclick="reset()">Reset</button>
    </div>
  </div>

</div>

<footer class="text-center mt-4 p-3 text-muted fs-2">
  PM2026 ©
</footer>

<script>
// =======================
const lessons = {
  th: "ก ข ฃ ค ฅ ฆ ง จ ฉ ช ซ ฌ ญ ฎ ฏ ฐ ฑ ฒ ณ ด ต ถ ท ธ น บ ป ผ ฝ พ ฟ ภ ม ย ร ล ว ศ ษ ส ห ฬ อ ฮ ฤ ฤๅ ฦ ฦๅ เป็นมนุษย์สุดประเสริฐเลิศคุณค่า กว่าบรรดาฝูงสัตว์เดรัจฉาน จงฝ่าฟันพัฒนาวิชาการ อย่าล้างผลาญฤๅเข่นฆ่าบีฑาใคร",
  en: "Aa Bb Cc Dd Ee Ff Gg Hh Ii Jj Kk Ll Mm Nn Oo Pp Qq Rr Ss Tt Uu Vv Ww Xx Yy Zz Pack my box with five dozen liquor jugs. Sphinx of black quartz, judge my vow. How vexingly quick daft zebras jump!",
  mix: "The quick brown fox jumps over the lazy dog และฉันกำลังฝึกพิมพ์ภาษาไทยทุกตัวอักษร Pack my box with five dozen liquor jugs พร้อมกับ ก ข ค ครบทุกตัว"
};

let lesson = lessons.th;

const segmenter = new Intl.Segmenter('th', { granularity: 'grapheme' });

function splitText(text) {
  return [...segmenter.segment(text)].map(s => s.segment);
}

let typed = "";
let startTime = null;
let timer = null;

const lessonDiv = document.getElementById("lesson");
const input = document.getElementById("input");

function render() {
  const lessonChars = splitText(lesson);
  const typedChars = splitText(typed);

  let html = "";

  for (let i = 0; i < lessonChars.length; i++) {
    let cls = "pending";

    if (i < typedChars.length) {
      cls = typedChars[i] === lessonChars[i] ? "correct" : "wrong";
    } else if (i === typedChars.length) {
      cls = "next";
    }

    html += `<span class="${cls}">${lessonChars[i]}</span>`;
  }

  lessonDiv.innerHTML = html;
}

function updateStats() {
  if (!startTime) return;

  const elapsed = (Date.now() - startTime) / 1000;
  const minutes = elapsed / 60;

  const lessonChars = splitText(lesson);
  const typedChars = splitText(typed);

  let correct = 0;

  for (let i = 0; i < typedChars.length; i++) {
    if (typedChars[i] === lessonChars[i]) correct++;
  }

  const acc = typedChars.length > 0
    ? (correct / typedChars.length) * 100
    : 100;

  const wpm = minutes > 0 ? (correct / 5) / minutes : 0;

  document.getElementById("time").innerText =
    new Date(elapsed * 1000).toISOString().substr(14, 5);

  document.getElementById("wpm").innerText = wpm.toFixed(1);
  document.getElementById("acc").innerText = acc.toFixed(1) + "%";
}

input.addEventListener("input", () => {
  const lessonChars = splitText(lesson);
  let typedChars = splitText(input.value);

  // 🔒 กันพิมพ์เกิน
  if (typedChars.length > lessonChars.length) {
    typedChars = typedChars.slice(0, lessonChars.length);
    input.value = typedChars.join('');
  }

  typed = input.value;

  if (!startTime && typed.length > 0) {
    startTime = Date.now();
    timer = setInterval(updateStats, 200);
  }

  render();

  // ✅ เช็คจบเกมแบบแม่น
  if (typedChars.length === lessonChars.length) {
    clearInterval(timer);
  }
});

function reset() {
  typed = "";
  startTime = null;
  clearInterval(timer);
  input.value = "";

  document.getElementById("time").innerText = "00:00";
  document.getElementById("wpm").innerText = "0";
  document.getElementById("acc").innerText = "100%";

  render();
}

function setLesson(lang) {
  lesson = lessons[lang];
  reset();
}

render();
</script>

</body>
</html>
